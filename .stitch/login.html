<main class="w-full max-w-[480px] z-10">

<div class="w-20 h-20 bg-primary rounded-full flex items-center justify-center shadow-lg shadow-primary/20 mb-sm scale-100 hover:scale-105 transition-transform duration-300">
<span class="material-symbols-outlined text-on-primary text-[44px]" data-icon="verified" data-weight="fill" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary mb-xs tracking-tight">
                    미디어 리터러시 · 팩트체크
                </h1>
<p class="font-body-base text-body-base text-on-surface-variant text-center opacity-80">
                    나만의 체크리스트로 미디어를 평가해보세요
                </p>
</div>

<div class="absolute inset-0 bg-gradient-to-t from-primary/20 to-transparent"></div>

<!-- Primary Action: Google Login -->

<span>학생으로 시작 (Google 로그인)</span>

<button class="w-full h-14 bg-surface-container-lowest border-2 border-primary/20 hover:border-primary text-primary rounded-2xl font-title-sm text-title-sm flex items-center justify-center gap-sm transition-all duration-300 active:scale-95">
<span class="material-symbols-outlined" data-icon="school">school</span>
<span>교사로 시작</span>
</button>
